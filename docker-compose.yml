services:
  wordpress:
    image: wordpress:latest
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./wp-content:/var/www/html/wp-content
      - wp_uploads:/var/www/html/wp-content/uploads
      - ./php-uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - wp_data:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  seed:
    image: wordpress:cli
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
      SEED_SITE_URL: http://localhost:8080
      SEED_SITE_TITLE: Luxury Copro
      SEED_ADMIN_USER: devadmin
      SEED_ADMIN_PASSWORD: devpassword
      SEED_ADMIN_EMAIL: dev@luxury-copro.local
      SEED_VERSION: 2026-05-20.1
    volumes:
      - ./wp-content:/var/www/html/wp-content
      - wp_uploads:/var/www/html/wp-content/uploads
      - ./scripts:/scripts:ro
      - wp_data:/var/www/html
    depends_on:
      - db
      - wordpress
    entrypoint: ["/bin/sh", "/scripts/seed-entrypoint.sh"]
    restart: "no"

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: wp
      PMA_PASSWORD: wp
    depends_on:
      - db
    restart: unless-stopped

volumes:
  wp_data:
  db_data:
  wp_uploads:
